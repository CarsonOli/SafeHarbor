name: CD - Azure Staging

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build_backend:
    name: Build backend artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/SafeHarbor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish SafeHarbor/SafeHarbor.csproj -c Release -o ${{ github.workspace }}/backend_publish
      - uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend_publish

  deploy_backend:
    name: Deploy backend to Azure App Service (staging)
    runs-on: ubuntu-latest
    needs: build_backend
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend_publish
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME_STAGING }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: backend_publish

  deploy_frontend:
    name: Deploy frontend to Azure Static Web Apps (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
