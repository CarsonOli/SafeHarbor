name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - deployment

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate SWA deployment token is configured
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "Missing SWA token. Set repository secret AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F."
            exit 1
          fi
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        env:
          # Route SPA API calls to the deployed backend service instead of same-origin SWA paths.
          VITE_API_BASE_URL: https://safeharborbackend-ggdyhzdggag9d3df.canadacentral-01.azurewebsites.net
        run: npm run build
      - name: Verify prebuilt output
        run: test -f ./frontend/dist/index.html
      - name: Copy SWA config into dist (if present)
        run: |
          if [ -f ./frontend/staticwebapp.config.json ]; then
            cp ./frontend/staticwebapp.config.json ./frontend/dist/staticwebapp.config.json
          else
            echo "No frontend/staticwebapp.config.json found; continuing without it."
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F }}
          action: "upload"
          app_location: "./frontend/dist"
          output_location: ""
          skip_app_build: true
