name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - deployment

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Validate SWA deployment token is configured
        env:
          # Mirror the exact fallback used by the deploy action so this check fails fast with a clear message.
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "Missing SWA token. Set AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F (preferred) or AZURE_STATIC_WEB_APPS_API_TOKEN in repository secrets."
            exit 1
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Route SPA API calls to the deployed backend service instead of same-origin SWA paths.
          VITE_API_BASE_URL: https://safeharborbackend-ggdyhzdggag9d3df.canadacentral-01.azurewebsites.net
        with:
          # Keep compatibility with both the Azure-generated secret name and a repo-standard fallback.
          # This avoids "No matching Static Web App was found or the api key was invalid" when teams
          # rotate to a generic secret key name but forget this workflow still expects the generated one.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_09AFC320F || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./frontend" # App source code path
          api_location: "" # Api source code path - optional
          # Vite emits production assets to "dist" (not "build"), so SWA must pick up that folder.
          output_location: "dist" # Built app content directory - optional
          # NOTE: Force a production build so SWA serves compiled JS assets instead of raw /src/*.tsx modules.
          # Build compiled Vite assets and hard-fail if source TSX entrypoints leak into deploy output.
          app_build_command: "npm run build && test -f dist/index.html && ! grep -q '/src/main.tsx' dist/index.html && cp staticwebapp.config.json dist/staticwebapp.config.json"
          ###### End of Repository/Build Configurations ######
